name: electricity

x-logging: &default-logging
  logging:
    driver: json-file

services:
  postgres:
    <<: *default-logging
    image: docker.io/postgres:18.4-alpine3.23
    restart: unless-stopped
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-electricity}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./storage/postgres:/var/lib/postgresql
      - ./migrations/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    env_file:
      - .env
    ports:
      - ${HOST_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:${POSTGRES_PORT:-5432}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d
            ${POSTGRES_DB:-electricity}",
        ]
      interval: 5s
      retries: 10
      timeout: 5s
    networks:
      - devnet
    profiles: ["dev"]

  garage:
    <<: *default-logging
    image: docker.io/dxflrs/garage:v2.3.0
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:3900:3900
      - ${HOST_IP:-127.0.0.1}:3902:3902
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-changeme}
      GARAGE_ADMIN_SECRET: ${GARAGE_ADMIN_TOKEN:-changeme}
      GARAGE_DEFAULT_BUCKET: mlflow
      GARAGE_DEFAULT_ACCESS_KEY: mlflow-key-id
      GARAGE_DEFAULT_SECRET_KEY: mlflow-secret-key
    volumes:
      - ./configs/garage/config.toml:/etc/garage.toml:ro
      - ./storage/garage:/var/lib/garage
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devnet
    profiles: ["dev"]

  garage-init:
    image: docker.io/curlimages/curl:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ADMIN_TOKEN="${GARAGE_ADMIN_TOKEN:-changeme}"
        BASE="http://garage:3902"

        until curl -sf "$$BASE/health" >/dev/null 2>&1; do sleep 2; done

        BUCKET_JSON="$$(curl -sf -X POST "$$BASE/v1/bucket" \
          -H "Authorization: Bearer $$ADMIN_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"globalAlias":"aemo-nemweb"}')"
        BUCKET_ID="$$(echo "$$BUCKET_JSON" | awk -F'"' '/"id"/{print $$4}')"

        KEY_JSON="$$(curl -sf -X POST "$$BASE/v1/key" \
          -H "Authorization: Bearer $$ADMIN_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"id":"aemo-key-id","secretKey":"aemo-secret-key","name":"aemo-key"}')"
        KEY_ID="aemo-key-id"

        [ -n "$$BUCKET_ID" ] && \
        curl -sf -X PUT "$$BASE/v1/bucket?id=$${BUCKET_ID}" \
          -H "Authorization: Bearer $$ADMIN_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"keyId\":\"$$KEY_ID\",\"permissions\":[\"read\",\"write\"]}" || true

        echo "AEMO bucket ready: aemo-nemweb (key=$$KEY_ID)"
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-changeme}
    depends_on:
      garage:
        condition: service_healthy
    networks:
      - devnet
    profiles: ["dev"]

  victoriametrics:
    <<: *default-logging
    image: docker.io/victoriametrics/victoria-metrics:v1.146.0
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:8428:8428
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    volumes:
      - ./storage/victoriametrics:/storage
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=${VM_RETENTION:-3M}"
      - "-httpListenAddr=:8428"
      - "-selfScrapeInterval=10s"
      - "-search.maxQueryDuration=30s"
      - "-memory.allowedPercent=60"
      - "-storage.minFreeDiskSpaceBytes=1GB"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:8428/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - devnet
    profiles: ["dev"]

  victorialogs:
    <<: *default-logging
    image: docker.io/victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:9428:9428
    volumes:
      - ./storage/victorialogs:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-httpListenAddr=:9428"
      - "-retentionPeriod=${VL_RETENTION:-3M}"
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - devnet
    profiles: ["dev"]

  vector:
    <<: *default-logging
    image: docker.io/timberio/vector:0.56.0-alpine
    restart: unless-stopped
    volumes:
      - ./configs/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      victorialogs:
        condition: service_healthy
    networks:
      - devnet
    profiles: ["dev"]

  nats:
    <<: *default-logging
    image: docker.io/nats:2.14.2
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:4222:4222
      - ${HOST_IP:-127.0.0.1}:8222:8222
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "nats-server", "--check", "healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devnet
    profiles: ["dev"]

  nats-init:
    image: docker.io/natsio/nats-box:latest
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for NATS..."
        until nc -z nats 4222; do sleep 1; done
        echo "Creating stream 'demand_5min'..."
        nats -s nats:4222 stream info demand_5min >/dev/null 2>&1 || \
          nats -s nats:4222 stream add demand_5min \
            --defaults \
            --subjects electricity.silver.demand_5min \
            --storage file \
            --retention limits \
            --max-msgs=-1 \
            --max-age 7d \
            --allow-rollup \
            --dupe-window 2m
        echo "NATS init complete"
    depends_on:
      nats:
        condition: service_started
    networks:
      - devnet
    profiles: ["dev"]

  nats-nui:
    image: ghcr.io/nats-nui/nui:0.9.3
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:31311:31311
    volumes:
      - ./storage/nui:/db
    depends_on:
      nats:
        condition: service_started
    networks:
      - devnet
    profiles: ["dev"]

  debezium-server:
    <<: *default-logging
    image: docker.io/debezium/server:3.0.0.Final
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    volumes:
      - ./configs/debezium:/debezium/config:ro
      - ./storage/debezium:/debezium/data
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/q/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - devnet
    profiles: ["dev"]

  dagster-user-code:
    <<: *default-logging
    build:
      context: .
      dockerfile: dagster/etl/Containerfile
    restart: unless-stopped
    environment:
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-postgres}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DAGSTER_POSTGRES_DB: dagster_db
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DBT_HOST: postgres
      DBT_PORT: ${POSTGRES_PORT:-5432}
      DBT_USER: ${POSTGRES_USER:-postgres}
      DBT_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DBT_DB: ${POSTGRES_DB:-electricity}
      DLT_PROJECT_DIR: /opt/dagster/dlt
      OPENELECTRICITY_API_KEY: ${OPENELECTRICITY_API_KEY:?err_OPENELECTRICITY_API_KEY_not_set_in_env}
    env_file:
      - .env
    volumes:
      - ./dagster:/opt/dagster/app
      - ./dlt:/opt/dagster/dlt
      - ./dbt:/opt/dagster/dbt
      - ./gx_quality:/opt/dagster/app/gx_quality
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(5);
            s.connect(('127.0.0.1',4000)); s.close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - devnet
    profiles: ["dev"]

  dagster-webserver:
    <<: *default-logging
    build:
      context: .
      dockerfile: ./dagster/daemon/Containerfile
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:3000:3000
    environment:
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-postgres}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DAGSTER_POSTGRES_DB: dagster_db
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - /opt/dagster/dagster_home/workspace.yaml
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:3000/dagit_info')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - devnet
    profiles: ["dev"]

  dagster-daemon:
    <<: *default-logging
    build:
      context: .
      dockerfile: ./dagster/daemon/Containerfile
    restart: unless-stopped
    environment:
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-postgres}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DAGSTER_POSTGRES_DB: dagster_db
      DAGSTER_POSTGRES_HOST: postgres
      DAGSTER_POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    entrypoint:
      - dagster-daemon
      - run
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os; c=open('/proc/1/cmdline').read(); exit(0 if
            'dagster-daemon' in c else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      dagster-user-code:
        condition: service_healthy
    networks:
      - devnet
    profiles: ["dev"]

  mlflow:
    <<: *default-logging
    image: ghcr.io/mlflow/mlflow:v3.14.0
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:5000:5000
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/mlflow_db
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
      MLFLOW_ARTIFACTS_DESTINATION: s3://mlflow/
      AWS_ACCESS_KEY_ID: mlflow-key-id
      AWS_SECRET_ACCESS_KEY: mlflow-secret-key
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
      MLFLOW_ALLOWED_HOSTS: "*"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install --quiet psycopg2-binary boto3 2>/dev/null
        exec mlflow server \
          --backend-store-uri "$${MLFLOW_BACKEND_STORE_URI}" \
          --default-artifact-root "$${MLFLOW_ARTIFACTS_DESTINATION}" \
          --serve-artifacts \
          --host 0.0.0.0 \
          --port 5000\
          --allowed-hosts "*"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; assert
            urllib.request.urlopen('http://localhost:5000/health').status ==
            200",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    networks:
      - devnet
    profiles: ["dev"]

  inference:
    <<: *default-logging
    build:
      context: .
      dockerfile: inference/Containerfile
    restart: unless-stopped
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
      AWS_ACCESS_KEY_ID: mlflow-key-id
      AWS_SECRET_ACCESS_KEY: mlflow-secret-key
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_DB: ${POSTGRES_DB:-electricity}
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: electricity.silver.demand_5min
    depends_on:
      debezium-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      nats:
        condition: service_started
      nats-init:
        condition: service_completed_successfully
    networks:
      - devnet
    profiles: ["dev"]

  dbt:
    <<: *default-logging
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    restart: "no"
    environment:
      DBT_USER: ${POSTGRES_USER:-postgres}
      DBT_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DBT_HOST: postgres
      DBT_PORT: ${POSTGRES_PORT:-5432}
      DBT_DB: ${POSTGRES_DB:-electricity}
      DBT_PROFILES_DIR: /usr/app
    volumes:
      - ./dbt:/usr/app
    entrypoint: ["dbt"]
    working_dir: /usr/app
    networks:
      - devnet
    profiles: ["dev"]

  dlt:
    <<: *default-logging
    build:
      context: ./dlt
      dockerfile: Containerfile
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./dlt:/app
      - ./shared:/app/shared:ro
    working_dir: /app
    networks:
      - devnet
    profiles: ["dev"]

  dlt-demand-nemweb:
    <<: *default-logging
    build:
      context: ./dlt
      dockerfile: Containerfile
    restart: unless-stopped
    command: ["run_demand_nemweb.py"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-electricity}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./dlt:/app
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devnet
    profiles: ["dev"]

  dashboard-backend:
    <<: *default-logging
    build:
      context: ./dashboard/backend
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:8000:8000
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5432}/electricity
      VM_URL: http://victoriametrics:8428
    volumes:
      - ./dashboard/backend:/app:ro
      - ./shared:/app/shared:ro
    depends_on:
      debezium-server:
        condition: service_healthy
      nats:
        condition: service_started
      nats-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started
    networks:
      - devnet
    profiles: ["dev"]

  dashboard-frontend:
    <<: *default-logging
    build:
      context: ./dashboard/frontend
      dockerfile: Containerfile
      target: development
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      dashboard-backend:
        condition: service_started
    volumes:
      - ./dashboard/frontend:/app
      - /app/node_modules
    networks:
      - devnet
    environment:
      - NODE_ENV=development
    profiles: ["dev"]

  dashboard-webserver:
    <<: *default-logging
    build:
      context: ./dashboard/webserver
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - ${HOST_IP:-127.0.0.1}:8080:80
    volumes:
      - ./configs/dashboard/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - devnet
    profiles: ["dev"]

networks:
  devnet:
    name: electricity_devnet
    driver: bridge
