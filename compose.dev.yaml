services:
  postgres:
    image: docker.io/postgres:18.3-alpine3.23
    restart: unless-stopped
    volumes:
      - ./storage/master:/var/lib/postgresql
      # - ./migrations:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-electricity}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - ${HOST_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:${POSTGRES_PORT:-5432}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d
            ${POSTGRES_DB:-electricity}",
        ]
      interval: 5s
      retries: 10
      timeout: 5s
    profiles: ["dev"]
