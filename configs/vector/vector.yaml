data_dir: /var/lib/vector

sources:
  podman_logs:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

transforms:
  to_ndjson:
    type: remap
    inputs: [podman_logs]
    source: |
      . = encode_json(.)

sinks:
  victorialogs:
    type: http
    inputs: [to_ndjson]
    uri: http://victorialogs:9428/insert/jsonline?_msg_field=message&_time_field=timestamp&_stream_fields=host,container_name
    encoding:
      codec: text
      framing:
        method: newline_delimited
    method: post
