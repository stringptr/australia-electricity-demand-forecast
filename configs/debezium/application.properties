debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=${POSTGRES_USER}
debezium.source.database.password=${POSTGRES_PASSWORD}
debezium.source.database.dbname=electricity
debezium.source.topic.prefix=electricity
debezium.source.plugin.name=pgoutput
debezium.source.slot.name=debezium_silver_slot
debezium.source.publication.name=debezium_silver_pub
debezium.source.publication.autocreate.mode=filtered
debezium.source.table.include.list=silver.demand_5min

debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://nats:4222
debezium.sink.nats-jetstream.subjects=electricity.silver.demand_5min
debezium.sink.nats-jetstream.storage=file
